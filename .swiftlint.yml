included:
  - Core
  - App
  - Features
  - DesignSystem

excluded:
  - .build
  - .swiftpm
  - Tests
  - Resources
  - Updates
  - Scripts

# Keep lint focused on production-signal issues. The previous config enabled
# style-heavy opt-in rules such as explicit_type_interface, multiline_arguments,
# and vertical_parameter_alignment_on_call, which produced hundreds of errors
# without identifying real backend or UI defects.
opt_in_rules:
  - closure_spacing
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - joined_default_parameter
  - operator_usage_whitespace
  - redundant_nil_coalescing
  - redundant_type_annotation
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

disabled_rules:
  - todo
  - trailing_comma
  - missing_docs
  - explicit_type_interface
  - multiline_arguments
  - multiline_parameters
  - vertical_parameter_alignment_on_call
  - modifier_order
  - let_var_whitespace
  - inclusive_language
  - function_parameter_count
  - cyclomatic_complexity
  - function_body_length
  - force_unwrapping

force_try:
  severity: error

implicitly_unwrapped_optional:
  severity: error

line_length:
  warning: 240
  error: 320
  ignores_urls: true
  ignores_comments: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 500
  error: 800

file_length:
  warning: 900
  error: 1400

identifier_name:
  min_length: 1
  max_length: 80
  excluded:
    - id
    - db
    - rtt
    - bps
    - url
    - vc
    - x
    - y

nesting:
  type_level:
    warning: 4
  function_level:
    warning: 5
