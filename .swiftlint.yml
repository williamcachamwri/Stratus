included:
  - Core
  - App

excluded:
  - .build
  - .swiftpm
  - Tests

opt_in_rules:
  - force_unwrapping
  - force_try
  - implicitly_unwrapped_optional
  - explicit_type_interface
  - closure_spacing
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - joined_default_parameter
  - let_var_whitespace
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - missing_docs
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - todo
  - fixme
  - missing_docs

analyzer_rules:
  - explicit_self

force_unwrapping:
  severity: error

force_try:
  severity: error

implicitly_unwrapped_optional:
  severity: error

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length: 1
  max_length: 60
  excluded:
    - id
    - db
    - rtt
    - bps
    - url
    - vc

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 4
