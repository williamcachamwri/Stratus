name: Bug report
description: Report a reproducible Stratus bug
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include real reproduction details and remove secrets from logs.
  - type: input
    id: app-version
    attributes:
      label: Stratus version or commit
      description: Example: v0.1.0, or git SHA.
      placeholder: v0.1.0 / 7086ce8
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: macOS 15.5 Sequoia
    validations:
      required: true
  - type: input
    id: xcode-version
    attributes:
      label: Xcode / Swift version
      placeholder: Xcode 16.4 / Swift 6.0+
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider type
      options:
        - Amazon S3
        - S3-compatible / MinIO / Ceph
        - Wasabi
        - Backblaze B2
        - Cloudflare R2
        - Google Drive
        - Dropbox
        - OneDrive
        - Box
        - iCloud Drive
        - SFTP
        - WebDAV
        - FTP / FTPS
        - Local app / UI only
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Numbered steps that trigger the problem.
      placeholder: |
        1. Add S3 account ...
        2. Upload file ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or diagnostics
      description: Paste redacted logs, diagnostic report excerpts, or crash output.
      render: text
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag images or videos here if the issue is visual.
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submit checklist
      options:
        - label: I removed secrets, tokens, access keys, and private bucket names from logs.
          required: true
        - label: I searched existing issues for duplicates.
          required: true
