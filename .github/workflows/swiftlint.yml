name: Swift Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swiftlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftFormat and SwiftLint
    runs-on: macos-15
    timeout-minutes: 25

    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          brew update
          brew install swiftformat swiftlint

      - name: Run lint gate
        run: Scripts/lint.sh
